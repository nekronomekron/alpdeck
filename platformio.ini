; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = Alpdeck

[common]
lib_deps_external = 
	kastenklicker/ESP-FTP-Server@^0.14.2
	zinggjm/GxEPD2@^1.6.9
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	; setup()/loop() run on a task whose stack defaults to 8192 bytes. Bringing
	; up the WiFi setup portal (web server + DNS + scan) from setup() does not
	; fit in that.
	-DARDUINO_LOOP_STACK_SIZE=16384

[env:Alpdeck]
framework = arduino
platform = espressif32
board = lolin_s3_pro
board_build.filesystem = littlefs
monitor_speed = 115200
build_flags = 
	${common.build_flags}
lib_deps =
	${common.lib_deps_external}
	; Hardware-only: the Wokwi build compiles the setup portal out and joins
	; Wokwi-GUEST directly, so it must not pull this in.
	tzapu/WiFiManager@^2.0.17

[env:Alpdeck-Wokwi]
framework = arduino
platform = espressif32
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
build_flags = 
	${common.build_flags}
	-DWOKWI_SIMULATOR=1
lib_deps = 
	${common.lib_deps_external}
