; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = Alpdeck

[common]
lib_deps_external =
	kastenklicker/ESP-FTP-Server@^0.14.2
	zinggjm/GxEPD2@^1.6.9
	; seesaw itself is vendored in lib/seesaw -- see that library.json for why.
	; This is the one real dependency of its core.
	adafruit/Adafruit BusIO@^1.17.2
build_flags = 
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DARDUINO_LOOP_STACK_SIZE=16384

[env:Alpdeck]
framework = arduino
platform = espressif32
board = lolin_s3_pro
board_build.filesystem = littlefs
monitor_speed = 115200
extra_scripts = post:scripts/factory_image.py
build_flags = 
	${common.build_flags}
lib_deps =
	${common.lib_deps_external}

[env:Alpdeck-Wokwi]
framework = arduino
platform = espressif32
board = esp32-s3-devkitc-1
board_build.filesystem = littlefs
build_flags = 
	${common.build_flags}
	-DWOKWI_SIMULATOR=1
lib_deps = 
	${common.lib_deps_external}
